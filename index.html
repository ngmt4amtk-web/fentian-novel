<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>焚天 ─ 相国董卓伝</title>
<style>
  :root{
    --black:#0E0B0A; --gold:#B8923C; --crimson:#9E2B25; --crimson2:#C8413B;
    --silk:#E8DCC0; --ivory:#C9BFA8; --jade:#3E8E7E;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; background:#000; overflow:hidden;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif; color:var(--silk);}
  #app{position:relative; width:100vw; height:100vh; height:100dvh; overflow:hidden; background:#000;}
  /* 背景 */
  #bg{position:absolute; inset:0; z-index:1; background:#000; background-size:cover; background-position:center; transition:opacity .5s ease;}
  #bgtint{position:absolute; inset:0; z-index:2; pointer-events:none; transition:background .8s ease;}
  #bgcap{position:absolute; top:14px; left:16px; z-index:5; font-size:12px; letter-spacing:.15em;
    color:rgba(232,220,192,.45); text-shadow:0 1px 4px #000;}
  /* 立ち絵ステージ（FGO式・縦画面・キャラ自動配置・話者スポットライト） */
  #stage{position:absolute; inset:0; z-index:3; pointer-events:none; overflow:hidden;}
  .sprite{position:absolute; bottom:0; left:50%; opacity:0; will-change:transform,opacity,filter;
    transform:translateX(-50%) translateY(16px);
    transition:opacity .45s ease, transform .45s ease, filter .35s ease, height .4s ease, left .45s ease;
    filter:drop-shadow(0 12px 22px rgba(0,0,0,.5));}
  .sprite img{height:100%; width:auto; display:block; transform-origin:bottom center; transition:transform .35s ease;}
  .sprite.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .sprite.dim{filter:brightness(.45) saturate(.82) drop-shadow(0 12px 22px rgba(0,0,0,.55));}
  .sprite.dim img{transform:scale(.94);}
  .sprite.spot img{transform:scale(1);}
  /* 演出 */
  #fx{position:absolute; inset:0; z-index:6; pointer-events:none; opacity:0;}
  #fx.flash{background:#fff; animation:flash .45s ease;}
  #fx.cutin{background:radial-gradient(circle, transparent 40%, rgba(158,43,37,.5)); animation:flash .5s ease;}
  @keyframes flash{0%{opacity:0;}20%{opacity:.9;}100%{opacity:0;}}
  #veil{position:absolute; inset:0; z-index:6; background:#000; opacity:0; pointer-events:none; transition:opacity .6s ease;}
  /* ゲージ */
  #gauges{display:none;}  /* 常時表示は廃止＝メニュー内の友好度パネルで確認 */
  /* メニュー内 友好度パネル */
  #menu-status{padding:16px 22px 4px; display:flex; flex-direction:column; gap:11px;}
  .strow{display:flex; align-items:center; gap:11px; font-size:13px; color:var(--silk); letter-spacing:.04em;}
  .stlab{flex:0 0 104px; white-space:nowrap;}
  .stbar{flex:1; height:9px; border-radius:5px; background:rgba(255,255,255,.08); overflow:hidden;
    box-shadow:inset 0 0 3px rgba(0,0,0,.6);}
  .stbar i{display:block; height:100%; border-radius:5px; transition:width .3s ease;}
  .g{width:9px; height:78px; border-radius:5px; background:rgba(255,255,255,.06);
    position:relative; overflow:hidden; box-shadow:inset 0 0 3px rgba(0,0,0,.6);}
  .g .fill{position:absolute; bottom:0; left:0; width:100%; transition:height .5s ease, box-shadow .3s;}
  .g.flash .fill{box-shadow:0 0 12px 3px currentColor;}
  .g .lab{position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:9px;
    color:rgba(232,220,192,.5); white-space:nowrap;}
  #g-diaochan .fill{background:var(--crimson2); color:var(--crimson2);}
  #g-rogan .fill{background:#C8662B; color:#C8662B;}
  #g-liju .fill{background:#5B7C9E; color:#5B7C9E;}
  #g-roken .fill{background:#B89AC8; color:#B89AC8;}
  /* テキスト窓（縦画面で見切れない／下端から浮かせたカード型／高さ上限＋内部スクロール） */
  #win{position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
    width:min(92%,900px); z-index:8;
    height:184px; height:clamp(184px,27dvh,244px); padding:14px 20px 28px;
    background:linear-gradient(180deg, rgba(13,9,7,.90), rgba(7,5,4,.975));
    border:1px solid rgba(184,146,60,.32); border-radius:14px;
    box-shadow:0 12px 46px rgba(0,0,0,.62), inset 0 1px 0 rgba(184,146,60,.12);
    cursor:pointer; display:flex; flex-direction:column; overflow:hidden;}
  #name{align-self:flex-start; display:inline-block; font-size:clamp(13px,1.8vw,16px); font-weight:bold;
    padding:3px 15px; margin-bottom:9px; border-radius:4px; color:#fff; letter-spacing:.08em; min-height:8px;}
  #text{font-size:clamp(16px,2.5vw,20px); line-height:1.78; color:var(--silk); text-shadow:0 1px 3px #000;
    overflow:hidden; min-height:0; flex:1 1 auto; padding-right:2px;
    white-space:pre-wrap; line-break:strict; word-break:normal; overflow-wrap:normal; letter-spacing:.02em;}
  /* 心の声（独白）＝クールなイタリックで"内なる声"と一目で分かるように */
  #text.narrate{color:#aab6c9; font-style:italic; opacity:.96;}
  #text .mark{color:var(--crimson2); margin-right:.4em;}
  #text.narrate .mark{color:#7d8ba3; font-style:normal;}
  #next{display:none!important;}
  @keyframes blink{50%{opacity:.2;}}
  /* 選択肢 */
  #choices{position:absolute; inset:0; z-index:9; display:none; flex-direction:column;
    justify-content:center; align-items:center; gap:14px; padding:24px;
    background:rgba(10,8,7,.55); backdrop-filter:blur(2px);}
  .ch{width:min(680px,92%); padding:15px 20px; cursor:pointer; color:var(--silk); font-size:clamp(14px,2vw,17px);
    line-height:1.5; text-align:center; background:linear-gradient(180deg,rgba(20,14,12,.95),rgba(10,8,7,.95));
    border:1px solid rgba(184,146,60,.4); border-radius:4px; transition:.2s;}
  .ch:hover,.ch:active{border-color:var(--crimson2); box-shadow:0 0 16px rgba(200,65,59,.4); color:#fff;}
  /* タイトル/エンド */
  #title,#endcard{position:absolute; inset:0; z-index:12; display:flex; flex-direction:column;
    justify-content:center; align-items:center; text-align:center;
    padding:calc(env(safe-area-inset-top,0px) + 30px) 30px calc(env(safe-area-inset-bottom,0px) + 30px);
    background:radial-gradient(ellipse at center, #2a0f0a 0%, #0a0605 70%, #000 100%);}
  #title{background:linear-gradient(180deg, rgba(8,5,4,.42) 0%, rgba(8,5,4,.30) 38%, rgba(8,5,4,.86) 100%), url('assets/title_kv.jpg'); background-size:cover; background-position:center;}
  #endcard{display:none; background:radial-gradient(ellipse at center,#1a1410 0%,#000 80%); background-size:cover; background-position:center;}
  #endcard .scrimwrap{position:relative; z-index:1;}
  .logo{font-size:clamp(46px,12vw,96px); font-weight:bold; letter-spacing:.12em; color:var(--gold);
    text-shadow:0 0 30px rgba(184,146,60,.4), 0 4px 8px #000;
    background:linear-gradient(180deg,#E8C97A,#B8923C 50%,#6e5520); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .sub{margin-top:14px; font-size:clamp(13px,3vw,18px); color:var(--silk); letter-spacing:.18em;}
  .sub2{margin-top:6px; font-size:clamp(11px,2.4vw,14px); color:rgba(232,220,192,.6); letter-spacing:.1em;}
  .btn{margin-top:42px; padding:13px 40px; cursor:pointer; font-size:17px; letter-spacing:.2em; color:var(--gold);
    border:1px solid var(--gold); border-radius:3px; background:rgba(184,146,60,.06); transition:.25s;}
  .btn:hover,.btn:active{background:var(--gold); color:var(--black);}
  #endtitle{font-size:clamp(30px,8vw,58px); font-weight:bold; letter-spacing:.1em; margin-bottom:10px;}
  #endname{font-size:14px; letter-spacing:.3em; color:var(--gold); margin-bottom:20px;}
  #endbody{font-size:14px; line-height:2; color:var(--ivory); max-width:620px;}
  .hint{position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 22px); font-size:11px;
    color:rgba(232,220,192,.45); letter-spacing:.2em; padding:0 24px;}
  /* FGO式HUD（オート/スキップ/ログ/メニュー） */
  #hud{position:absolute; top:calc(env(safe-area-inset-top,0px) + 9px); right:calc(env(safe-area-inset-right,0px) + 10px);
    z-index:10; display:none; gap:7px; align-items:center;}
  #hud.on{display:flex;}
  .hbtn{pointer-events:auto; cursor:pointer; font-size:11px; font-weight:bold; letter-spacing:.1em; color:var(--silk);
    min-width:30px; text-align:center; padding:6px 11px; border:1px solid rgba(184,146,60,.5); border-radius:15px;
    background:rgba(10,8,7,.55); backdrop-filter:blur(3px); transition:.18s; user-select:none; line-height:1;}
  .hbtn:active{transform:scale(.94);}
  .hbtn.active{background:var(--gold); color:var(--black); border-color:var(--gold); box-shadow:0 0 12px rgba(184,146,60,.45);}
  /* オーバーレイ共通（ログ／メニュー） */
  .overlay{position:absolute; inset:0; z-index:11; display:none; align-items:center; justify-content:center;
    padding:calc(env(safe-area-inset-top,0px) + 46px) 16px calc(env(safe-area-inset-bottom,0px) + 30px);
    background:rgba(6,4,3,.8); backdrop-filter:blur(4px);}
  .overlay.on{display:flex;}
  .ovpanel{width:min(560px,95%); max-height:100%; display:flex; flex-direction:column;
    background:linear-gradient(180deg,rgba(18,13,10,.97),rgba(9,6,5,.99));
    border:1px solid rgba(184,146,60,.4); border-radius:15px; overflow:hidden;
    box-shadow:0 16px 50px rgba(0,0,0,.7);}
  .ovhead{padding:15px 20px; font-size:15px; font-weight:bold; letter-spacing:.25em; color:var(--gold);
    border-bottom:1px solid rgba(184,146,60,.25);}
  #logbody{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:4px 20px 16px;}
  .logrow{padding:11px 0; border-bottom:1px solid rgba(184,146,60,.1); font-size:14px; line-height:1.7;}
  .logrow:last-child{border-bottom:none;}
  .logrow .ln{display:block; font-size:11px; color:var(--gold); letter-spacing:.12em; margin-bottom:3px;}
  .logrow .lt{color:var(--silk);}
  .logrow.nr .lt{color:var(--ivory);}
  .mitem{padding:16px 22px; cursor:pointer; font-size:15px; color:var(--silk); letter-spacing:.08em;
    border-bottom:1px solid rgba(184,146,60,.12); transition:.16s;}
  .mitem:active{background:rgba(184,146,60,.16);}
  .ovclose{padding:15px; text-align:center; cursor:pointer; font-size:14px; letter-spacing:.2em; color:var(--gold);
    background:rgba(184,146,60,.08);}
  .ovclose:active{background:rgba(184,146,60,.2);}
  /* ウインドウ非表示モード（立ち絵を眺める／次タップで復帰） */
  #app.hideui #win, #app.hideui #hud, #app.hideui #gauges, #app.hideui #bgcap{opacity:0; pointer-events:none;}
  #win,#hud,#gauges,#bgcap{transition:opacity .3s ease;}
  /* 横画面モードは廃止＝縦前提。立ち絵もテキスト窓も縦レイアウトで固定 */
  /* (未使用の回転案内スタイル) */
  #rotate{position:absolute; top:calc(env(safe-area-inset-top, 0px) + 8px); left:50%; transform:translateX(-50%); z-index:13;
    display:none; align-items:center; gap:6px; padding:8px 15px; border-radius:20px; cursor:pointer;
    background:rgba(20,14,10,.92); border:1px solid rgba(184,146,60,.45); color:var(--gold);
    font-size:12px; letter-spacing:.05em; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.5);}
  /* 縦画面が主＝横向き案内ナグは出さない（横にすればFGO配置になるのは維持） */
</style>
</head>
<body>
<div id="app">
  <div id="bg"></div>
  <div id="bgtint"></div>
  <div id="bgcap"></div>
  <div id="stage"></div>
  <div id="fx"></div>
  <div id="veil"></div>
  <div id="gauges">
    <div class="g" id="g-diaochan"><div class="fill"></div><span class="lab">貂蝉</span></div>
    <div class="g" id="g-rogan"><div class="fill"></div><span class="lab">嫉妬</span></div>
    <div class="g" id="g-liju"><div class="fill"></div><span class="lab">李儒</span></div>
    <div class="g" id="g-roken"><div class="fill"></div><span class="lab">露見</span></div>
  </div>
  <div id="win">
    <span id="name"></span>
    <div id="text"></div>
    <span id="next">▼</span>
  </div>
  <div id="choices"></div>

  <!-- FGO式HUD（プレイ中のみ表示） -->
  <div id="hud">
    <div class="hbtn" id="b-auto">AUTO</div>
    <div class="hbtn" id="b-skip">SKIP</div>
    <div class="hbtn" id="b-log">LOG</div>
    <div class="hbtn" id="b-menu">☰</div>
  </div>
  <!-- バックログ -->
  <div id="log" class="overlay"><div class="ovpanel">
    <div class="ovhead">ログ</div><div id="logbody"></div><div class="ovclose" id="log-close">閉じる</div>
  </div></div>
  <!-- メニュー -->
  <div id="menu" class="overlay"><div class="ovpanel">
    <div class="ovhead">メニュー</div>
    <div id="menu-status"></div>
    <div class="mitem" id="m-speed">文字速度：瞬間</div>
    <div class="mitem" id="m-hide">ウインドウを隠す</div>
    <div class="mitem" id="m-restart">最初から読む</div>
    <div class="mitem" id="m-title">タイトルへ戻る</div>
    <div class="ovclose" id="menu-close">閉じる</div>
  </div></div>

  <div id="title">
    <div class="logo">焚天</div>
    <div class="sub">刺客を、落とせ。── 力こそ、正義。</div>
    <div class="sub2">相国董卓伝 ／ 立ち絵付きノベルゲーム</div>
    <div class="btn" id="startbtn">物語を始める</div>
    <div class="hint">あなた＝董卓。送り込まれた刺客・貂蝉を落とせ。</div>
  </div>
  <div id="endcard">
    <div id="endtitle"></div>
    <div id="endname"></div>
    <div id="endbody"></div>
    <div class="btn" id="restartbtn">タイトルへ</div>
  </div>
  <div id="rotate">📱 横向きにするとFGO配置（タップで閉じる）</div>
</div>

<script src="scenes.js"></script>
<script>
const MOOD = {
  warm:'linear-gradient(160deg,#2a120c,#150a08 60%,#070403)',
  cool:'linear-gradient(160deg,#0c1320,#0a0e16 60%,#05070c)',
  fire:'linear-gradient(0deg,#4a1505,#1a0805 70%,#0a0402)',
  night:'linear-gradient(160deg,#10101a,#08080c 70%,#000)',
  dawn:'linear-gradient(160deg,#2a2018,#181410 60%,#0a0806)',
  default:'linear-gradient(160deg,#1a1008,#0a0604)'
};
// 背景画像（場所キャプションで割り当て。該当外はムードグラデにフォールバック）
const BG_IMG={
  hall:'assets/bg/hall.jpg', chamber:'assets/bg/chamber.jpg', fengyi:'assets/bg/fengyi.jpg',
  hokueki_dusk:'assets/bg/bg_hokueki_dusk.jpg', hokueki_night:'assets/bg/bg_hokueki_night.jpg',
  hokueki_dawn:'assets/bg/bg_hokueki_dawn.jpg', corridor:'assets/bg/bg_corridor_night.jpg',
  courtyard:'assets/bg/bg_courtyard_moon.jpg', meiwu:'assets/bg/bg_meiwu_gate_dawn.jpg',
  street:'assets/bg/bg_changan_street.jpg'};
const VIGNETTE='linear-gradient(180deg, rgba(6,4,3,.30) 0%, rgba(6,4,3,0) 20%, rgba(6,4,3,0) 46%, rgba(6,4,3,.5) 80%, rgba(6,4,3,.88) 100%)';
const TINT={ warm:'rgba(48,20,8,.22)', cool:'rgba(10,16,32,.30)', fire:'rgba(64,16,6,.26)', night:'rgba(8,10,30,.34)', dawn:'rgba(46,30,16,.18)', default:'rgba(20,12,8,.20)' };
function pickBg(cap){
  const c=cap||'';
  if(/北掖門|未央殿/.test(c)){                         // クライマックス＝時間帯で出し分け
    if(/黄昏|血/.test(c)) return 'hokueki_dusk';
    if(/払暁|未明|暁|夜明|日の出|薄明|朝陽|朝/.test(c)) return 'hokueki_dawn';
    return 'hokueki_night';
  }
  if(/鳳儀亭|荷花|池/.test(c)) return 'fengyi';
  if(/大広間|広間/.test(c)) return 'hall';
  if(/中庭/.test(c)) return 'courtyard';
  if(/回廊/.test(c)) return 'corridor';
  if(/出立|郿塢.{0,5}門/.test(c)) return 'meiwu';
  if(/大通り|市曹|長安市|街道|晒/.test(c)) return 'street';
  if(/私室|居室|書斎|文書庫|奥院|閨|寝|書庫|郿塢/.test(c)) return 'chamber';
  return null;
}
function setBg(cap, mood){
  const key=pickBg(cap); const bg=E('bg'), tint=E('bgtint');
  if(key){
    bg.style.background='#000'; bg.style.backgroundImage="url('"+BG_IMG[key]+"')";
    bg.style.backgroundSize='cover'; bg.style.backgroundPosition='center';
    const t=TINT[mood]||TINT.default;
    tint.style.background=VIGNETTE+', linear-gradient(0deg,'+t+','+t+')';
  } else {
    bg.style.backgroundImage='none'; bg.style.background=MOOD[mood]||MOOD.default;
    tint.style.background='none';
  }
}
const CHARMETA = {
  '董卓':{c:'#7a5e1e',bg:'linear-gradient(180deg,#5a4418,#3a2c10)'},
  '貂蝉':{c:'#fff',bg:'linear-gradient(180deg,#9E2B25,#6e1d1a)'},
  '呂布':{c:'#fff',bg:'linear-gradient(180deg,#5a5650,#3a3733)'},
  '王允':{c:'#fff',bg:'linear-gradient(180deg,#5a4a66,#382e42)'},
  '李儒':{c:'#cdd6e2',bg:'linear-gradient(180deg,#2E3A4A,#1c2530)'},
  '李粛':{c:'#e6e6e6',bg:'linear-gradient(180deg,#4a4e52,#303336)'},
  '蔡邕':{c:'#fff',bg:'linear-gradient(180deg,#5a544a,#383530)'},
  '童子たち':{c:'#ddd',bg:'linear-gradient(180deg,#3a3a40,#26262a)'},
};
const ENDINGS = {
  BIYOKU:{title:'比翼',name:'TRUE ─ 真・生存エンド',body:'力で獲った心が、たまたま牙を返さなかっただけよ。──傍らに、嘘か本当か確かめ切れぬ刃を抱いた女がいる。その危うい、最良の勝利。'},
  KOOU:{title:'孤王',name:'代償生存エンド',body:'貂蝉は落とせた。だが無双の臣を、女ひとりのために砕いた。喪失を覚えた、孤独な獣の王。'},
  FENTIAN:{title:'焚天',name:'BAD ─ 史実死エンド',body:'落とせなかった。連環計は成り、宮門で呂布の戟が咽喉を貫く。力の正義は、陰謀に殺された。天を焚いた火は、灯一つ残して消えた。'},
  RAKKA:{title:'落花',name:'悲劇恋愛エンド',body:'心は得た。だが罠を読み切れず──貂蝉が刃の前に身を投げた。落とした花は、散ることでしか、わしを救えなかった。'},
};
// エンディング分岐（閾値・友好度を見て決定）
function resolveEnding(f, intent){
  // 貂蝉好感度が低ければ何をしても史実死（連環成立）
  if(f.diaochan <= 2) return 'FENTIAN';
  // 力で討つ：落とせていれば孤王、落とせていなければ史実死
  if(intent === 'kill') return f.diaochan >= 3 ? 'KOOU' : 'FENTIAN';
  // 対峙・和解：落とし切り×罠を見抜けば比翼、見抜けなければ落花
  if(f.diaochan >= 6 && (f.roken >= 3 || f.liju >= 3)) return 'BIYOKU';
  return 'RAKKA';
}
const GMAX = {diaochan:12, rogan:8, liju:6, roken:8};

const NAME2CHAR={'董卓':'dongzhuo','貂蝉':'diaochan','呂布':'lvbu','王允':'wangyun','李儒':'liju','李粛':'lisu','蔡邕':'caiyong'};

const E = id=>document.getElementById(id);
let flags, node, idx, intent, currentSpeaker;
let stage=[]; const stageEls={};
// FGO式コントロール状態
let auto=false, skip=false, skipTimer=null, autoTimer=null, hideUI=false, revealing=false, finishReveal=null, typeIv=null, history=[];
let pages=[], pageIdx=0, curPrefix='', curText=null;
const SPEEDS=[{n:'瞬間',ms:0},{n:'速',ms:14},{n:'中',ms:28},{n:'遅',ms:48}]; let speedIdx=0;

function start(){
  flags={diaochan:0,rogan:0,liju:0,roken:0}; intent=null;
  clearStage(); currentSpeaker=null;
  setAuto(false); setSkip(false); setHideUI(false);
  if(autoTimer){clearTimeout(autoTimer); autoTimer=null;} clearInterval(typeIv); revealing=false;
  pages=[]; pageIdx=0; curText=null; history=[]; E('hud').classList.add('on');
  E('menu').classList.remove('on'); E('log').classList.remove('on');
  updateGauges(false);
  E('title').style.display='none'; E('endcard').style.display='none';
  go('prologue');
}
function go(id){
  if(id==='__resolve_reconcile__'){ return ending(resolveEnding(flags,'reconcile')); }
  if(id==='__resolve_kill__'){ return ending(resolveEnding(flags,'kill')); }
  if(!SCENES[id]){ console.warn('missing node',id); return ending('FENTIAN'); }
  node=SCENES[id]; idx=0; render();
}
function render(){
  if(idx>=node.length){ return; }
  const s=node[idx];
  if(s.t==='bg'){ setBg(s.bg, s.mood); E('bgcap').textContent=s.bg||''; clearStage(); idx++; return render(); }
  if(s.t==='sprite'){ showSprite(s.key); idx++; return render(); }
  if(s.t==='hide'){ clearStage(); idx++; return render(); }
  if(s.t==='fx'){ doFx(s.fx); idx++; return render(); }
  if(s.t==='jump'){ return go(s.goto); }
  if(s.t==='ending'){ return ending(s.id); }
  if(s.t==='choice'){ return showChoices(s.options||[]); }
  if(s.t==='say'){ say(s.name||'', s.text||''); return; }
  if(s.t==='narrate'){ narrate(s.text||''); return; }
  idx++; return render();
}
function advance(){
  if(hideUI){ setHideUI(false); return; }                          // 非表示モードはタップで復帰（進めない）
  if(E('menu').classList.contains('on')||E('log').classList.contains('on')) return;
  if(E('choices').style.display==='flex') return;                  // 選択肢表示中
  if(E('title').style.display!=='none') return;                    // タイトル表示中
  if(E('endcard').style.display==='flex') return;                  // エンド表示中
  if(!node) return;
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  if(revealing){ if(finishReveal) finishReveal(); return; }        // 表示中タップ＝全文を一気に出す
  if(pageIdx < pages.length-1){ pageIdx++; typeLine(curPrefix, pages[pageIdx]); return; }  // 次ページ
  idx++; render();
}
function say(name,text){
  const meta=CHARMETA[name]||{c:'#fff',bg:'rgba(60,50,40,.9)'};
  const n=E('name'); n.textContent=name; n.style.background=meta.bg; n.style.color=meta.c; n.style.visibility='visible';
  E('text').classList.remove('narrate');
  history.push({name:name,text:text,nr:false});
  startLine('', text);
  currentSpeaker=NAME2CHAR[name]||null; applySpotlight();
}
function narrate(text){
  E('name').style.visibility='hidden';
  E('text').classList.add('narrate');
  history.push({name:'',text:text,nr:true});
  startLine('', text);
  currentSpeaker=null; applySpotlight();
}
// 文末（。！？）で改行を入れて1文1行のリズムに（読みやすさ）
function formatLine(text){
  return (text||'')                                                       // 文末で改行＝1文1行
    .replace(/([。！？!?]+[」』）)\]］】]*)/g,'$1\n')
    .replace(/[ 　]*\n[ 　]*/g,'\n')
    .replace(/\n{2,}/g,'\n').replace(/\n+$/,'')
    .replace(/([一-鿿々〆ヶ])(?=[一-鿿々〆ヶ])/g,'$1⁠'); // 隣接漢字を結合＝熟語(洛陽/血筋等)を語の途中で折らない。禁則(行頭の。等)はCSS line-break:strict が担保
}
// 固定枠に収まるページに分割（フォントは読みやすいまま・スクロール無し・見切れ無し）
function paginate(formatted, prefix){
  const t=E('text');
  const fit=(s)=>{ t.innerHTML=prefix; const sp=document.createElement('span'); sp.textContent=s; t.appendChild(sp); return t.scrollHeight<=t.clientHeight+1; };
  const out=[]; let rest=formatted, guard=0;
  while(rest.length && guard++<60){
    if(fit(rest)){ out.push(rest); rest=''; break; }
    let lo=1, hi=rest.length, best=1;
    while(lo<=hi){ const mid=(lo+hi)>>1; if(fit(rest.slice(0,mid))){ best=mid; lo=mid+1; } else hi=mid-1; }
    const head=rest.slice(0,best);
    const nl=head.lastIndexOf('\n');
    let cut;
    if(nl>0){ cut=nl+1; }   // 文境界(\n)優先＝1文をページで跨がない
    else { const lb=Math.max(head.lastIndexOf('。'),head.lastIndexOf('！'),head.lastIndexOf('？'),head.lastIndexOf('、'));
           cut=(lb>=best*0.4)?lb+1:best; }   // 1文がページ超の時だけ句読点/任意で割る
    out.push(rest.slice(0,cut).replace(/^\n+|\n+$/g,''));
    rest=rest.slice(cut).replace(/^[\n 　]+/,'');
  }
  t.innerHTML='';
  return out.length?out:[''];
}
// （）が複数ページに跨ったら、各ページを（…）で閉じ開きする（続きページが地の文化しないように）
function bracketPages(pgs){
  const out=[]; let carry=0;                    // 前ページから繰り越した未閉じ（の数
  for(let pg of pgs){
    let s='（'.repeat(carry)+pg, depth=0;
    for(const ch of s){ if(ch==='（') depth++; else if(ch==='）'){ depth--; if(depth<0) depth=0; } }
    if(depth>0) s=s+'）'.repeat(depth);
    carry=depth; out.push(s);
  }
  return out;
}
function startLine(prefix, text){
  curPrefix=prefix; curText=text; pages=bracketPages(paginate(formatLine(text), prefix)); pageIdx=0;
  typeLine(curPrefix, pages[0]);
}
// 画面回転/リサイズ時：立ち絵配置とテキストのページ割りを組み直す
function refit(){
  renderStage();
  if(curText!=null && node && E('title').style.display==='none' && E('endcard').style.display!=='flex'){
    const keep=pageIdx;
    pages=bracketPages(paginate(formatLine(curText), curPrefix)); pageIdx=Math.min(keep,pages.length-1);
    const t=E('text'); t.innerHTML=curPrefix; const sp=document.createElement('span'); sp.textContent=pages[pageIdx]; t.appendChild(sp);
    revealing=false; E('next').textContent=(pageIdx<pages.length-1)?'▽':'▼'; E('next').style.display='inline';
  }
}
// ── タイプ送り：表示中タップで一気→次タップで次ページ/次行 ──
function typeLine(prefix, text){
  const t=E('text');
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  clearInterval(typeIv);
  t.innerHTML=prefix;
  const span=document.createElement('span'); t.appendChild(span);
  E('next').style.display='none';
  revealing=true;
  let i=0; const ms=skip?0:SPEEDS[speedIdx].ms;
  const finish=()=>{ clearInterval(typeIv); span.textContent=text; revealing=false;
    E('next').textContent=(pageIdx<pages.length-1)?'▽':'▼'; E('next').style.display='inline'; onLineDone(); };
  finishReveal=finish;
  if(ms<=0){ finish(); return; }
  typeIv=setInterval(()=>{ i++; span.textContent=text.slice(0,i); if(i>=text.length) finish(); }, ms);
}
function onLineDone(){
  if(skip) return;                                       // skipはskipTimerが進める
  if(auto){ const len=(E('text').textContent||'').length; autoTimer=setTimeout(advance, 700+len*42); }
}
function setAuto(on){ auto=on; E('b-auto').classList.toggle('active',on);
  if(!on && autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  if(on && !revealing && node) onLineDone();
}
function setSkip(on){ skip=on; E('b-skip').classList.toggle('active',on);
  if(skipTimer){ clearInterval(skipTimer); skipTimer=null; }
  if(on){ skipTimer=setInterval(()=>{
    if(E('menu').classList.contains('on')||E('log').classList.contains('on')||E('choices').style.display==='flex'||
       E('title').style.display!=='none'||E('endcard').style.display==='flex'){ setSkip(false); return; }
    advance();
  }, 95); }
}
function setHideUI(on){ hideUI=on; E('app').classList.toggle('hideui',on); }
function openLog(){
  const b=E('logbody'); b.innerHTML='';
  history.slice(-300).forEach(h=>{ const r=document.createElement('div'); r.className='logrow'+(h.nr?' nr':'');
    r.innerHTML=(h.name?'<span class="ln">'+esc(h.name)+'</span>':'')+'<span class="lt">'+esc(h.text)+'</span>'; b.appendChild(r); });
  E('log').classList.add('on'); requestAnimationFrame(()=>{ b.scrollTop=b.scrollHeight; });
}
// ── 立ち絵ステージング：showSprite=「そのキャラを舞台に乗せる」。位置はステージ人数から自動決定 ──
// 高さは向き毎に一定＝人数が変わっても既存キャラがリサイズしない(位置だけスライド)
const LAYOUT_P={1:{x:[50],h:80},2:{x:[22,78],h:80},3:{x:[15,50,85],h:80}};                         // 縦＝全身・一定
const LAYOUT_L={1:{x:[50],h:132,b:-36},2:{x:[29,71],h:132,b:-36},3:{x:[20,50,80],h:132,b:-36}};    // 横＝FGO風拡大・一定
function curLayout(){ return LAYOUT_P; }   // 縦前提（横画面モードは廃止）
const STAGE_CAP=3;
function charKey(k){ return k? String(k).split('_')[0] : null; }
function ensureEl(ch){
  let el=stageEls[ch];
  if(!el){ el=document.createElement('div'); el.className='sprite'; el.dataset.char=ch;
    el.appendChild(document.createElement('img')); E('stage').appendChild(el); stageEls[ch]=el; }
  return el;
}
function removeEl(ch){ const el=stageEls[ch]; if(!el) return; el.classList.remove('show');
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },450); delete stageEls[ch]; }
function clearStage(){ Object.keys(stageEls).forEach(removeEl); stage=[]; }
function showSprite(key){
  const ch=charKey(key); if(!ch) return;
  const item=stage.find(s=>s.char===ch);
  if(item){ item.key=key; }                       // 同キャラ＝表情だけ差し替え、位置は維持
  else{
    if(stage.length>=STAGE_CAP){                  // 上限超過は話者でない最古を退場
      let i=stage.findIndex(s=>s.char!==currentSpeaker); if(i<0) i=0;
      removeEl(stage.splice(i,1)[0].char);
    }
    stage.push({char:ch,key});
  }
  renderStage();
}
function renderStage(){
  const LL=curLayout();
  const n=Math.min(stage.length,STAGE_CAP); const L=LL[n]||LL[STAGE_CAP];
  stage.forEach((s,i)=>{
    const el=ensureEl(s.char); const img=el.querySelector('img');
    const src='assets/sprites/'+s.key+'.png';
    if(img.getAttribute('src')!==src){ img.src=src; }
    el.style.left=L.x[i]+'%'; el.style.height=L.h+'%'; el.style.bottom=(L.b!=null?L.b:0)+'%';
    requestAnimationFrame(()=>el.classList.add('show'));
  });
  applySpotlight();
}
function applySpotlight(){
  const lit = currentSpeaker && stage.some(s=>s.char===currentSpeaker);
  stage.forEach(s=>{
    const el=stageEls[s.char]; if(!el) return;
    if(!lit){ el.classList.remove('dim','spot'); el.style.zIndex=4; }
    else if(s.char===currentSpeaker){ el.classList.add('spot'); el.classList.remove('dim'); el.style.zIndex=6; }
    else{ el.classList.add('dim'); el.classList.remove('spot'); el.style.zIndex=3; }
  });
}
function doFx(fx){
  const el=E('fx');
  if(fx==='blackout'||fx==='fade'){ const v=E('veil'); v.style.opacity= fx==='blackout'?'1':'.6'; setTimeout(()=>v.style.opacity='0',700); return; }
  el.className=''; void el.offsetWidth; el.classList.add(fx==='cutin'?'cutin':'flash');
}
function showChoices(opts){
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; } setSkip(false);
  E('next').style.display='none';
  const c=E('choices'); c.innerHTML=''; c.style.display='flex';
  opts.forEach(o=>{
    const b=document.createElement('div'); b.className='ch'; b.textContent=o.text;
    b.onclick=(ev)=>{ ev.stopPropagation();
      const d=o.d||{}; let changed=[];
      for(const k in d){ if(d[k]){ flags[k]=(flags[k]||0)+d[k]; changed.push(k);} }
      updateGauges(true,changed);
      c.style.display='none';
      go(o.goto);
    };
    c.appendChild(b);
  });
}
function updateGauges(flash,changed){
  ['diaochan','rogan','liju','roken'].forEach(k=>{
    const g=E('g-'+k); const pct=Math.max(0,Math.min(100, (flags[k]/GMAX[k])*100 ));
    g.querySelector('.fill').style.height=pct+'%';
    if(flash && changed && changed.includes(k)){ g.classList.add('flash'); setTimeout(()=>g.classList.remove('flash'),700); }
  });
}
// メニュー内の友好度パネル（ラベル付き・開いた時に描画）
function renderStatus(){
  const G=[['diaochan','貂蝉の好感度','#C8413B'],['rogan','呂布の嫉妬','#C8662B'],['liju','李儒の信頼','#5B7C9E'],['roken','連環の露見','#B89AC8']];
  E('menu-status').innerHTML = G.map(g=>{
    const pct=Math.max(0,Math.min(100, (((flags&&flags[g[0]])||0)/GMAX[g[0]])*100 ));
    return '<div class="strow"><span class="stlab">'+g[1]+'</span><span class="stbar"><i style="width:'+pct+'%;background:'+g[2]+'"></i></span></div>';
  }).join('');
}
const CGM={BIYOKU:'cg_biyoku', KOOU:'cg_koou', FENTIAN:'cg_fentian', RAKKA:'cg_rakka'};
function ending(id){
  setAuto(false); setSkip(false); E('hud').classList.remove('on');
  const e=ENDINGS[id]||ENDINGS.FENTIAN;
  const cg=CGM[id]||CGM.FENTIAN;
  E('endcard').style.background="linear-gradient(180deg, rgba(6,4,3,.30) 0%, rgba(6,4,3,.50) 42%, rgba(6,4,3,.93) 100%), url('assets/cg/"+cg+".jpg') center/cover";
  E('endtitle').textContent='【'+e.title+'】';
  E('endname').textContent=e.name;
  E('endbody').textContent=e.body;
  E('endcard').style.display='flex';
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 画面のどこをタップ/クリックしても次へ進む（選択肢・タイトル・エンドは上のガードで無効）
E('app').addEventListener('click',advance);
document.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='Enter') advance(); });
E('startbtn').onclick=(e)=>{ e.stopPropagation(); start(); };
E('restartbtn').onclick=(e)=>{ e.stopPropagation(); E('endcard').style.display='none'; E('title').style.display='flex'; };
// FGO式HUD／メニュー／ログの配線
E('b-auto').onclick=e=>{ e.stopPropagation(); setAuto(!auto); };
E('b-skip').onclick=e=>{ e.stopPropagation(); setSkip(!skip); };
E('b-log').onclick=e=>{ e.stopPropagation(); openLog(); };
E('b-menu').onclick=e=>{ e.stopPropagation(); renderStatus(); E('menu').classList.add('on'); };
E('log-close').onclick=e=>{ e.stopPropagation(); E('log').classList.remove('on'); };
E('menu-close').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); };
E('m-speed').onclick=e=>{ e.stopPropagation(); speedIdx=(speedIdx+1)%SPEEDS.length; E('m-speed').textContent='文字速度：'+SPEEDS[speedIdx].n; };
E('m-hide').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); setHideUI(true); };
E('m-restart').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); start(); };
E('m-title').onclick=e=>{ e.stopPropagation(); E('menu').classList.remove('on'); E('log').classList.remove('on');
  setAuto(false); setSkip(false); E('hud').classList.remove('on');
  E('endcard').style.display='none'; E('title').style.display='flex'; };
['log','menu'].forEach(id=>{ E(id).onclick=e=>{ e.stopPropagation(); if(e.target===E(id)) E(id).classList.remove('on'); }; });
E('rotate').onclick=(e)=>{ e.stopPropagation(); E('rotate').style.display='none'; };
// 画面回転・リサイズで縦↔横レイアウトを組み直す
try{ matchMedia('(orientation:landscape)').addEventListener('change', refit); }catch(_){}
let _rezT; window.addEventListener('resize', ()=>{ clearTimeout(_rezT); _rezT=setTimeout(refit,160); });
// SCENES未ロード時の保険
if(typeof SCENES==='undefined'){ window.SCENES={}; }
// 立ち絵・背景を先読み（表情切替の表示遅延を解消）
(function preloadAll(){
  try{
    const ks=new Set();
    for(const k in SCENES) for(const s of SCENES[k]) if(s&&s.t==='sprite'&&s.key) ks.add(s.key);
    ks.forEach(k=>{ const i=new Image(); i.src='assets/sprites/'+k+'.png'; });
    Object.values(BG_IMG).forEach(u=>{ const i=new Image(); i.src=u; });
  }catch(_){}
})();
</script>
